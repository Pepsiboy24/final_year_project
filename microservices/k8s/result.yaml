apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result-service
  template:
    metadata:
      labels:
        app: result-service
    spec:
      containers:
      - name: result-service
        image: result-service:latest
        resources:
          requests:
            cpu: 100m
          limits:
            cpu: 500m
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          value: "postgres://result_user:result_password@result-db:5432/result_db"
        - name: JWT_SECRET
          value: "supersecretjwtkey123"
        - name: STUDENT_SERVICE_URL
          value: "http://student-service:3000"
---
apiVersion: v1
kind: Service
metadata:
  name: result-service
spec:
  selector:
    app: result-service
  ports:
  - port: 3000
    targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: result-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: result-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
